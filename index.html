<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scratchpad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Scratchpad</h1>

  <div id="auth">
    <label>GitHub Token: <input type="password" id="token"></label>
    <button onclick="saveToken()">Save Token</button>
    <span id="tokenStatus"></span>
  </div>

  <section id="notesSection">
    <h2>Notes</h2>
    <textarea id="noteText" placeholder="Write a note..."></textarea>
    <button onclick="saveNote()">Save Note</button>
    <ul id="noteList"></ul>
    <div id="noteView"></div>
  </section>

  <section id="filesSection">
    <h2>Files</h2>
    <input type="file" id="fileInput" multiple>
    <button onclick="uploadFiles()">Upload Files</button>
    <div id="dropZone">Drag and drop files here</div>
    <ul id="fileList"></ul>
  </section>

  <script src="main.js"></script>
</body>
</html>
