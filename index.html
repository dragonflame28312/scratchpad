<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratchpad</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="container">
  <div id="sidebar">
    <h2>Workspaces</h2>
    <button id="newWorkspaceBtn">+ New Workspace</button>
    <ul id="workspaceList"></ul>
    <hr>
    <h3 id="notesHeading">Notes</h3>
    <button id="newNoteBtn">+ New Note</button>
    <ul id="noteList"></ul>
    <hr>
    <button id="exportBtn">Export Data</button>
    <button id="importBtn">Import Data</button>
    <input type="file" id="importInput" style="display:none" accept="application/json">
  </div>
  <div id="main">
    <div id="noteHeader">
      <h2 id="currentNoteName">Select a note</h2>
    </div>
    <textarea id="noteContent" placeholder="Start typing..." disabled></textarea>
    <button id="saveNoteBtn">Save</button>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
